);

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const[user,setUser]=useState(null);
  const[authReady,setAuthReady]=useState(false);
  const[lang,setLang]=useState("es");
  const[view,setView]=useState("home");
  const[step,setStep]=useState(0);
  const[form,setForm]=useState({age:"",gender:"",interests:[],style:"",lesson:""});
  const[story,setStory]=useState(null);
  const[imgUrl,setImgUrl]=useState(null);
  const[busy,setBusy]=useState(false);
  const[savedMsg,setSavedMsg]=useState(false);
  const[stories,setStories]=useState([]);
  const[selected,setSelected]=useState(null);
  const[proposal,setProposal]=useState("");
  const[displayed,setDisplayed]=useState("");
  const[animating,setAnimating]=useState(false);
  const[apiKeys,setApiKeys]=useState({});
  const[apiUsage,setApiUsage]=useState({});
  const[keysLoaded,setKeysLoaded]=useState(false);
  const[adminSaved,setAdminSaved]=useState(false);
  const[preferredApi,setPreferredApi]=useState("groq");
  const[voices,setVoices]=useState([]);
  const[selVoice,setSelVoice]=useState("");
  const[speaking,setSpeaking]=useState(false);
  const animRef=useRef(null);
  const lessonRef=useRef(null);
  const L=LANGS[lang];
  const isAdmin=user&&user.uid===ADMIN_UID;

  // Auth
  useEffect(()=>firebase.auth().onAuthStateChanged(u=>{setUser(u);setAuthReady(true);}),[]);

  // Voices
  useEffect(()=>{
    const load=()=>{const v=window.speechSynthesis.getVoices();if(v.length)setVoices(v);};
    if("speechSynthesis" in window){load();window.speechSynthesis.onvoiceschanged=load;setTimeout(load,500);}
  },[]);

  // Load admin keys
  useEffect(()=>{
    if(!user||!isAdmin||keysLoaded)return;
    db.doc("config/apikeys").get().then(snap=>{
      if(snap.exists){
        const d=snap.data();
        setApiKeys(d);
        const usage={};
        APIS.forEach(a=>{usage[a.id]=d["usage_"+a.id]||0;});
        setApiUsage(usage);
        if(d.preferred)setPreferredApi(d.preferred);
      }
      setKeysLoaded(true);
    });
  },[user,isAdmin,keysLoaded]);

  const loadKeysForGen=()=>db.doc("config/apikeys").get().then(s=>s.exists?s.data():{});
  const signIn=()=>auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
  const signOutUser=()=>{auth.signOut();setUser(null);setView("home");};

  const saveAdminKeys=async()=>{
    const data={...apiKeys,preferred:preferredApi};
    APIS.forEach(a=>{data["usage_"+a.id]=apiUsage[a.id]||0;});
    await db.doc("config/apikeys").set(data);
    setAdminSaved(true);setTimeout(()=>setAdminSaved(false),2000);
  };

  const bumpUsage=async(apiId)=>{
    setApiUsage(p=>({...p,[apiId]:(p[apiId]||0)+1}));
    const snap=await db.doc("config/apikeys").get();
    if(!snap.exists)return;
    const d=snap.data();const k="usage_"+apiId;
    db.doc("config/apikeys").set({...d,[k]:(d[k]||0)+1});
  };

  // Generate story
  const generate=async()=>{
    setBusy(true);
    const lesson=lessonRef.current?lessonRef.current.value:"";
    const f={...form,lesson};
    const cfg=await loadKeysForGen();
    const prompt=L.prompt(f);
    const order=[preferredApi,...APIS.map(a=>a.id).filter(id=>id!==preferredApi)];
    let text="",usedApi="";
    for(const apiId of order){
      const api=APIS.find(a=>a.id===apiId);
      // puter no necesita key
      if(apiId==="puter"){
        try{text=await api.call(prompt);if(text){usedApi=apiId;await bumpUsage(apiId);break;}}catch{continue;}
        continue;
      }
      // cloudflare necesita accountId|token
      const key=cfg[apiId];
      if(!key)continue;
      try{text=await api.call(prompt,key);if(text){usedApi=apiId;await bumpUsage(apiId);break;}}catch{continue;}
    }
    if(!text)text="No se pudo generar el cuento. Verifica las API keys en Admin.";
    const img=await genImage(L.imgP(f));
    setImgUrl(img);
    setStory({text,lang,style:f.style,age:f.age,gender:f.gender,interests:f.interests,lesson:f.lesson,
      usedApi,imgUrl:img,authorUid:user?user.uid:null,authorName:user?user.displayName:"Anónimo",
      rating:{avg:0,count:0,votes:{}},chapters:[],createdAt:new Date().toISOString()});
    setDisplayed("");setAnimating(false);setBusy(false);setView("story");
  };

  const saveStory=async()=>{
    if(!user||!story)return;
    const ref=await db.collection("stories").add(story);
    setStory(p=>({...p,id:ref.id}));
    setSavedMsg(true);setTimeout(()=>setSavedMsg(false),2000);
  };

  const loadStories=async()=>{
    const snap=await db.collection("stories").orderBy("createdAt","desc").limit(30).get();
    setStories(snap.docs.map(d=>({id:d.id,...d.data()})));
  };

  useEffect(()=>{if(view==="community")loadStories();},[view]);

  const rateStory=async(s,stars)=>{
    if(!user||!s.id)return;
    const votes={...(s.rating&&s.rating.votes?s.rating.votes:{}),[user.uid]:stars};
    const vals=Object.values(votes);
    const avg=vals.reduce((a,b)=>a+b,0)/vals.length;
    await db.doc("stories/"+s.id).update({"rating.votes":votes,"rating.avg":avg,"rating.count":vals.length});
    const upd={...s,rating:{votes,avg,count:vals.length}};
    setStories(p=>p.map(x=>x.id===s.id?upd:x));
    if(selected&&selected.id===s.id)setSelected(upd);
  };

  const proposeChapter=async()=>{
    if(!user||!proposal.trim()||!selected||!selected.id)return;
    const ch={text:proposal,proposedBy:user.displayName,proposedByUid:user.uid,status:"pending",createdAt:new Date().toISOString()};
    await db.doc("stories/"+selected.id).update({chapters:firebase.firestore.FieldValue.arrayUnion(ch)});
    setSelected(p=>({...p,chapters:[...(p.chapters||[]),ch]}));
    setProposal("");
  };

  const updateChapter=async(idx,status)=>{
    if(!selected||!selected.id)return;
    const chapters=selected.chapters.map((c,i)=>i===idx?{...c,status}:c);
    await db.doc("stories/"+selected.id).update({chapters});
    setSelected(p=>({...p,chapters}));
  };

  // Animation
  const startAnim=(fromWord=0)=>{
    clearInterval(animRef.current);
    const words=((selected?selected.text:story?story.text:"")||"").split(" ");
    let i=Math.max(0,fromWord);
    setDisplayed(words.slice(0,i).join(" "));
    setAnimating(true);
    animRef.current=setInterval(()=>{
      i++;setDisplayed(words.slice(0,i).join(" "));
      if(i>=words.length){clearInterval(animRef.current);setAnimating(false);}
    },120);
  };
  const pauseAnim=()=>{clearInterval(animRef.current);setAnimating(false);};
  const rewindAnim=()=>startAnim(Math.max(0,displayed.split(" ").length-20));
  useEffect(()=>()=>clearInterval(animRef.current),[]);

  // Audio
  const speak=(text)=>{
    if(!("speechSynthesis" in window))return;
    if(speaking){window.speechSynthesis.cancel();setSpeaking(false);return;}
    window.speechSynthesis.cancel();
    const utt=new SpeechSynthesisUtterance(text);
    utt.rate=0.85;utt.pitch=1.05;
    const langMap={es:"es",ca:"ca",fr:"fr",en:"en",pt:"pt"};
    const chosen=voices.find(v=>v.voiceURI===selVoice)||voices.find(v=>v.lang.startsWith(langMap[lang]))||voices[0];
    if(chosen)utt.voice=chosen;
    utt.onend=()=>setSpeaking(false);
    utt.onerror=()=>setSpeaking(false);
    window.speechSynthesis.speak(utt);
    setSpeaking(true);
  };
  const voicesForLang=voices.filter(v=>v.lang.startsWith(lang==="ca"?"ca":lang==="es"?"es":lang==="fr"?"fr":lang==="pt"?"pt":"en"));

  const resetCreate=()=>{
    setStep(0);setStory(null);setImgUrl(null);setDisplayed("");setAnimating(false);
    setForm({age:"",gender:"",interests:[],style:"",lesson:""});setView("create");
  };
  const toggleInterest=v=>setForm(p=>({...p,interests:p.interests.includes(v)?p.interests.filter(x=>x!==v):[...p.interests,v]}));
  const canNext=()=>{if(step===0)return form.age!=="";if(step===1)return form.gender!=="";if(step===2)return form.interests.length>0;if(step===3)return form.style!=="";return true;};

  // ── Style helpers ─────────────────────────────────────────────────────────
  const css={
    bg:{minHeight:"100vh",background:"linear-gradient(135deg,#e0e7ff,#f5f3ff,#fce7f3)"},
    card:{background:"#fff",borderRadius:24,boxShadow:"0 10px 40px rgba(0,0,0,.1)",padding:28,width:"100%",maxWidth:440,margin:"0 auto"},
    inp:{width:"100%",boxSizing:"border-box",padding:"12px 16px",border:"2px solid #e5e7eb",borderRadius:14,fontSize:15,outline:"none",fontFamily:"inherit"},
    pill:(on,c="#6366f1")=>({padding:"10px 16px",borderRadius:14,border:"2px solid "+(on?c:"#e5e7eb"),background:on?c+"18":"#fff",color:on?c:"#6b7280",fontWeight:700,cursor:"pointer",fontSize:14,transition:"all .15s"}),
    btn:(green)=>({padding:"12px 20px",borderRadius:16,border:"none",cursor:"pointer",fontWeight:700,fontSize:14,background:green?"linear-gradient(to right,#22c55e,#10b981)":GR,color:"#fff"}),
    btnBack:{padding:"12px 20px",borderRadius:16,border:"none",cursor:"pointer",fontWeight:600,fontSize:14,background:"#f3f4f6",color:"#374151"},
  };

  // Nav
  const Nav=()=>(
    <nav style={{background:"#fff",boxShadow:"0 1px 8px rgba(0,0,0,.08)",padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:10}}>
      <button onClick={()=>setView("home")} style={{background:"none",border:"none",cursor:"pointer",fontWeight:700,color:"#4f46e5",fontSize:15}}>🌙 Cuentos</button>
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        {user&&<>
          <button onClick={()=>setView("community")} style={{...css.pill(view==="community"),padding:"6px 12px",fontSize:12}}>{L.community}</button>
          <button onClick={resetCreate} style={{...css.pill(view==="create"||view==="story"),padding:"6px 12px",fontSize:12}}>{L.create}</button>
          {isAdmin&&<button onClick={()=>setView("admin")} style={{...css.pill(view==="admin","#f97316"),padding:"6px 12px",fontSize:12}}>🛡 Admin</button>}
          <button onClick={signOutUser} style={{background:"none",border:"none",cursor:"pointer",color:"#9ca3af",fontSize:18}}>⎋</button>
        </>}
        <select value={lang} onChange={e=>setLang(e.target.value)} style={{border:"1px solid #e5e7eb",borderRadius:8,padding:"4px 6px",fontSize:13,cursor:"pointer"}}>
          {Object.entries(LANGS).map(([k,v])=><option key={k} value={k}>{v.flag} {v.name}</option>)}
        </select>
      </div>
    </nav>
  );

  const Page=({children})=>(
    <div style={css.bg}><Nav/><div style={{padding:16,maxWidth:620,margin:"0 auto"}}>{children}</div></div>
  );

  // Story box with image
  const StoryBox=({text,img})=>(
    <div>
      {img&&<img src={img} alt="Ilustración" style={{width:"100%",borderRadius:16,marginBottom:12,boxShadow:"0 4px 20px rgba(0,0,0,.12)"}} onError={e=>e.target.style.display="none"}/>}
      <div style={{background:"#fffbeb",borderRadius:18,padding:20,borderLeft:"4px solid #fb923c",marginBottom:12,minHeight:80}}>
        {displayed===""&&!animating
          ?<p style={{color:"#9ca3af",fontSize:13,margin:0,fontStyle:"italic"}}>Pulsa {L.read} para leer</p>
          :<p style={{margin:0,color:"#1f2937",lineHeight:1.8,whiteSpace:"pre-wrap",fontSize:14,fontFamily:"Georgia,serif"}}>
            {displayed}{animating&&<span style={{display:"inline-block",width:8,height:16,background:"#fb923c",marginLeft:4,borderRadius:3,verticalAlign:"middle",animation:"pulse 1s infinite"}}/>}
          </p>
        }
      </div>
    </div>
  );

  // Read controls
  const ReadCtrl=()=>(
    <div style={{display:"flex",gap:8,marginBottom:12}}>
      <button onClick={rewindAnim} style={{flex:1,padding:"8px 4px",borderRadius:12,background:"#f9fafb",border:"2px solid #e5e7eb",cursor:"pointer",fontWeight:700,fontSize:12,color:"#374151"}}>{L.rewind}</button>
      {animating
        ?<button onClick={pauseAnim} style={{flex:2,padding:"8px",borderRadius:12,background:"#fff7ed",border:"2px solid #fed7aa",color:"#c2410c",fontWeight:700,cursor:"pointer",fontSize:12}}>{L.pause}</button>
        :<button onClick={()=>startAnim(displayed?displayed.split(" ").length:0)} style={{flex:2,padding:"8px",borderRadius:12,background:"#eef2ff",border:"2px solid #c7d2fe",color:"#4338ca",fontWeight:700,cursor:"pointer",fontSize:12}}>{L.read}</button>
      }
      <button onClick={()=>{setDisplayed("");startAnim(0);}} style={{flex:1,padding:"8px 4px",borderRadius:12,background:"#f9fafb",border:"2px solid #e5e7eb",cursor:"pointer",fontWeight:700,fontSize:12,color:"#374151"}}>{L.restart}</button>
    </div>
  );

  // Audio controls
  const AudioCtrl=({text})=>(
    <div style={{marginBottom:14,padding:12,background:"#f5f3ff",borderRadius:14}}>
      {voicesForLang.length>0&&
        <select value={selVoice} onChange={e=>setSelVoice(e.target.value)}
          style={{width:"100%",padding:"8px 10px",borderRadius:10,border:"1px solid #c4b5fd",fontSize:13,color:"#4c1d95",background:"#fff",marginBottom:8}}>
          <option value="">🎙 Voz automática</option>
          {voicesForLang.map(v=><option key={v.voiceURI} value={v.voiceURI}>{v.name}</option>)}
        </select>
      }
      <button onClick={()=>speak(text)}
        style={{width:"100%",padding:10,borderRadius:12,fontWeight:700,fontSize:13,cursor:"pointer",border:"2px solid",
          background:speaking?"#fee2e2":"#ede9fe",color:speaking?"#991b1b":"#5b21b6",borderColor:speaking?"#fca5a5":"#c4b5fd"}}>
        {speaking?"⏹ Detener audio":"🔊 Escuchar cuento"}
      </button>
    </div>
  );

  // Chapters section
  const Chapters=({s,isAuthor})=>(
    <div style={{borderTop:"1px solid #f3f4f6",paddingTop:16}}>
      <h3 style={{margin:"0 0 12px",fontSize:14,fontWeight:700,color:"#374151"}}>{L.chapters}</h3>
      {(s.chapters||[]).map((ch,i)=>(
        <div key={i} style={{borderRadius:12,padding:12,marginBottom:8,border:"2px solid "+(ch.status==="accepted"?"#6ee7b7":ch.status==="rejected"?"#fca5a5":"#e5e7eb"),background:ch.status==="accepted"?"#f0fdf4":ch.status==="rejected"?"#fef2f2":"#f9fafb"}}>
          <p style={{margin:"0 0 6px",color:"#374151",fontSize:12}}>{ch.text}</p>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <span style={{fontSize:11,color:"#9ca3af"}}>{ch.proposedBy}</span>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:11,fontWeight:600,color:ch.status==="accepted"?"#059669":ch.status==="rejected"?"#dc2626":"#d97706"}}>{L[ch.status]}</span>
              {isAuthor&&ch.status==="pending"&&
                <div style={{display:"flex",gap:4}}>
                  <button onClick={()=>updateChapter(i,"accepted")} style={{padding:"3px 8px",borderRadius:8,background:"#d1fae5",border:"none",cursor:"pointer",color:"#065f46",fontSize:12}}>✓</button>
                  <button onClick={()=>updateChapter(i,"rejected")} style={{padding:"3px 8px",borderRadius:8,background:"#fee2e2",border:"none",cursor:"pointer",color:"#991b1b",fontSize:12}}>✗</button>
                </div>
              }
            </div>
          </div>
        </div>
      ))}
      {!isAuthor&&user&&
        <div style={{marginTop:12}}>
          <textarea value={proposal} onChange={e=>setProposal(e.target.value)} placeholder={L.proposePH}
            style={{...css.inp,height:80,resize:"none",fontSize:13}}/>
          <button onClick={proposeChapter} disabled={!proposal.trim()}
            style={{width:"100%",marginTop:8,padding:10,borderRadius:14,fontWeight:700,fontSize:13,border:"none",
              cursor:proposal.trim()?"pointer":"not-allowed",background:proposal.trim()?GR:"#f3f4f6",color:proposal.trim()?"#fff":"#9ca3af"}}>
            {L.send}
          </button>
        </div>
      }
    </div>
  );

  // ── Loading ───────────────────────────────────────────────────────────────
  if(!authReady)return(
    <div style={{...css.bg,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{width:36,height:36,border:"3px solid #6366f1",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
    </div>
  );

  // ── Admin ─────────────────────────────────────────────────────────────────
  if(view==="admin"&&isAdmin)return(
    <Page>
      <div style={{background:"#fff",borderRadius:24,boxShadow:"0 10px 40px rgba(0,0,0,.1)",padding:28}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
          <span style={{fontSize:24}}>🛡</span>
          <h2 style={{margin:0,fontSize:20,fontWeight:700}}>Panel Admin</h2>
        </div>
        <p style={{fontSize:12,color:"#9ca3af",marginBottom:20}}>Solo visible para ti. Keys protegidas en Firestore.</p>

        {/* Counters */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:10,marginBottom:20}}>
          {APIS.map(a=>(
            <div key={a.id} style={{background:"#f9fafb",borderRadius:14,padding:12,textAlign:"center",border:"1px solid #f3f4f6"}}>
              <div style={{fontSize:22,fontWeight:700,color:"#4f46e5"}}>{apiUsage[a.id]||0}</div>
              <div style={{fontSize:11,color:"#6b7280",marginTop:2}}>{a.name}</div>
              <div style={{fontSize:10,color:"#9ca3af"}}>{a.free}</div>
            </div>
          ))}
        </div>

        {/* Preferred */}
        <div style={{marginBottom:16}}>
          <label style={{fontSize:12,fontWeight:600,color:"#6b7280",display:"block",marginBottom:6}}>API preferida (fallback automático)</label>
          <select value={preferredApi} onChange={e=>setPreferredApi(e.target.value)}
            style={{width:"100%",padding:"10px",borderRadius:12,border:"2px solid #e5e7eb",fontSize:13}}>
            {APIS.map(a=><option key={a.id} value={a.id}>{a.name} — {a.free}</option>)}
          </select>
        </div>

        {/* Keys — todos los campos */}
        {APIS.filter(a=>a.id!=="puter").map(a=>(
          <div key={a.id} style={{marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <label style={{fontSize:12,fontWeight:600,color:"#374151"}}>{a.name}</label>
              <a href={a.url} target="_blank" rel="noreferrer" style={{fontSize:12,color:"#6366f1",textDecoration:"none"}}>Obtener key →</a>
            </div>
            {a.id==="cloudflare"
              ?<input type="password" placeholder="AccountID|API_Token (separados por |)"
                  value={apiKeys[a.id]||""} onChange={e=>setApiKeys(p=>({...p,[a.id]:e.target.value}))}
                  style={{...css.inp,fontFamily:"monospace",fontSize:12}}/>
              :<input type="password" placeholder={"Key de "+a.name}
                  value={apiKeys[a.id]||""} onChange={e=>setApiKeys(p=>({...p,[a.id]:e.target.value}))}
                  style={{...css.inp,fontFamily:"monospace",fontSize:12}}/>
            }
            <p style={{fontSize:10,color:"#9ca3af",marginTop:2}}>{a.free}</p>
          </div>
        ))}
        <div style={{marginBottom:14,padding:12,background:"#f0fdf4",borderRadius:12,border:"1px solid #6ee7b7"}}>
          <p style={{margin:0,fontSize:12,color:"#065f46"}}>✅ <strong>Puter.js</strong> — Sin key. Accede a Claude, GPT y Gemini gratis automáticamente.</p>
        </div>

        <button onClick={saveAdminKeys}
          style={{width:"100%",padding:14,borderRadius:18,fontWeight:700,fontSize:14,marginTop:4,border:"none",cursor:"pointer",
            background:adminSaved?"#d1fae5":GR,color:adminSaved?"#065f46":"#fff",outline:adminSaved?"2px solid #6ee7b7":"none"}}>
          {adminSaved?"✓ Guardado en Firestore":"Guardar todas las keys"}
        </button>
        <div style={{marginTop:12,padding:12,background:"#fff7ed",borderRadius:12,border:"1px solid #fed7aa"}}>
          <p style={{fontSize:12,color:"#c2410c",margin:0}}>🔒 Solo tu UID puede leer o escribir estas keys. Los demás usuarios las usan indirectamente.</p>
        </div>
      </div>
    </Page>
  );

  // ── Home ──────────────────────────────────────────────────────────────────
  if(view==="home")return(
    <Page>
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"72vh",textAlign:"center",gap:20}}>
        <div style={{fontSize:64,animation:"pulse 2s infinite"}}>🌙</div>
        <div>
          <h1 style={{margin:0,fontSize:28,fontWeight:700,color:"#1f2937"}}>Cuentos de Buenas Noches</h1>
          <p style={{color:"#6b7280",marginTop:8,fontSize:14,maxWidth:320,margin:"8px auto 0"}}>Crea, comparte y califica cuentos. Colabora en nuevos capítulos con tu comunidad.</p>
        </div>
        {!user
          ?<button onClick={signIn} style={{...css.btn(),padding:"14px 32px",fontSize:16,display:"flex",alignItems:"center",gap:10}}>👤 Entrar con Google</button>
          :<div style={{display:"flex",gap:12,flexWrap:"wrap",justifyContent:"center"}}>
              <button onClick={resetCreate} style={{...css.btn(),padding:"12px 24px",fontSize:15,display:"flex",alignItems:"center",gap:8}}>✨ {L.create}</button>
              <button onClick={()=>setView("community")} style={{padding:"12px 24px",borderRadius:18,fontWeight:700,fontSize:15,background:"#fff",border:"2px solid #c7d2fe",color:"#4f46e5",cursor:"pointer"}}>🌍 {L.community}</button>
            </div>
        }
      </div>
    </Page>
  );

  // ── Community list ────────────────────────────────────────────────────────
  if(view==="community"&&!selected)return(
    <Page>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <h2 style={{margin:0,fontSize:18,fontWeight:700}}>{L.community}</h2>
        <button onClick={loadStories} style={{background:"none",border:"none",color:"#6366f1",cursor:"pointer",fontSize:13}}>↻ Actualizar</button>
      </div>
      {stories.length===0
        ?<p style={{textAlign:"center",color:"#9ca3af",marginTop:60}}>{L.noStories}</p>
        :<div style={{display:"flex",flexDirection:"column",gap:12}}>
            {stories.map(s=>(
              <button key={s.id} onClick={()=>{setSelected(s);setDisplayed("");setAnimating(false);}}
                style={{background:"#fff",borderRadius:18,boxShadow:"0 2px 12px rgba(0,0,0,.06)",padding:0,textAlign:"left",border:"none",cursor:"pointer",width:"100%",overflow:"hidden"}}>
                {s.imgUrl&&<img src={s.imgUrl} alt="" style={{width:"100%",height:140,objectFit:"cover"}} onError={e=>e.target.style.display="none"}/>}
                <div style={{padding:14}}>
                  <p style={{margin:0,fontSize:13,color:"#374151",overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{s.text&&s.text.slice(0,100)}...</p>
                  <div style={{display:"flex",justifyContent:"space-between",marginTop:8,alignItems:"center"}}>
                    <span style={{fontSize:11,color:"#9ca3af"}}>{s.authorName} · {LANGS[s.lang]&&LANGS[s.lang].flag}</span>
                    <span style={{fontSize:13,fontWeight:700,color:"#374151"}}>★ {s.rating&&s.rating.avg?s.rating.avg.toFixed(1):"—"} <span style={{fontSize:11,color:"#9ca3af"}}>({s.rating&&s.rating.count?s.rating.count:0})</span></span>
                  </div>
                </div>
              </button>
            ))}
          </div>
      }
    </Page>
  );

  // ── Story detail (community) ──────────────────────────────────────────────
  if(view==="community"&&selected){
    const myVote=selected.rating&&selected.rating.votes&&user?selected.rating.votes[user.uid]||0:0;
    const isAuthor=user&&selected.authorUid===user.uid;
    return(
      <Page>
        <button onClick={()=>{setSelected(null);pauseAnim();}} style={{background:"none",border:"none",color:"#6366f1",cursor:"pointer",fontSize:13,marginBottom:12}}>← {L.back}</button>
        <div style={{background:"#fff",borderRadius:24,boxShadow:"0 10px 40px rgba(0,0,0,.1)",overflow:"hidden"}}>
          <div style={{background:GR,padding:20,color:"#fff"}}>
            <p style={{margin:0,fontSize:12,opacity:.8}}>{selected.authorName} · {LANGS[selected.lang]&&LANGS[selected.lang].flag}</p>
            <p style={{margin:"4px 0 0",fontWeight:700}}>★ {selected.rating&&selected.rating.avg?selected.rating.avg.toFixed(1):"—"} <span style={{fontSize:12,opacity:.7}}>({selected.rating&&selected.rating.count||0} votos)</span></p>
          </div>
          <div style={{padding:20}}>
            <StoryBox text={selected.text} img={selected.imgUrl}/>
            <ReadCtrl/>
            <AudioCtrl text={selected.text}/>
            {!isAuthor&&user&&
              <div style={{marginBottom:16}}>
                <p style={{fontSize:12,fontWeight:600,color:"#6b7280",marginBottom:4}}>{L.rate}</p>
                <Stars value={myVote} onChange={stars=>rateStory(selected,stars)}/>
              </div>
            }
            <Chapters s={selected} isAuthor={isAuthor}/>
          </div>
        </div>
      </Page>
    );
  }

  // ── Create wizard ─────────────────────────────────────────────────────────
  const progress=((step+1)/5)*100;
  const Prog=({n})=>(
    <div style={{marginTop:20,textAlign:"center"}}>
      <div style={{fontSize:11,color:"#9ca3af",marginBottom:4}}>{L.step} {n} {L.of} 5</div>
      <div style={{height:6,background:"#f3f4f6",borderRadius:6}}><div style={{height:6,background:"#6366f1",borderRadius:6,width:progress+"%",transition:"width .3s"}}/></div>
    </div>
  );

  if(view==="create"){
    if(busy)return(
      <Page>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"60vh",textAlign:"center",gap:16}}>
          <div style={{fontSize:56,animation:"pulse 2s infinite"}}>🌙</div>
          <h2 style={{margin:0,fontSize:20,fontWeight:700,color:"#1f2937"}}>{L.steps[5]}</h2>
          <p style={{color:"#9ca3af",fontSize:14,margin:0}}>{L.subs[5]}</p>
          <p style={{color:"#a78bfa",fontSize:12,margin:0}}>🎨 Generando imagen con Pollinations.ai...</p>
          <div style={{width:32,height:32,border:"3px solid #6366f1",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
        </div>
      </Page>
    );

    const icons=["✨","💜","⭐","📖","💚"];
    return(
      <Page>
        <div style={{display:"flex",justifyContent:"center",paddingTop:8}}>
          <div style={{...css.card,maxWidth:step===2?520:440}}>
            <div style={{textAlign:"center",marginBottom:20}}>
              <div style={{fontSize:42}}>{icons[step]}</div>
              <h1 style={{margin:"8px 0 2px",fontSize:20,fontWeight:700,color:"#1f2937"}}>{L.steps[step]}</h1>
              <p style={{margin:0,color:"#9ca3af",fontSize:13}}>{L.subs[step]}</p>
            </div>

            {step===0&&<>
              <input type="number" min="2" max="12" placeholder={L.ageLabel} value={form.age}
                onChange={e=>setForm(p=>({...p,age:e.target.value}))}
                style={{...css.inp,fontSize:26,textAlign:"center",fontWeight:700,marginBottom:16}}/>
              <button onClick={()=>setStep(1)} disabled={!canNext()} style={{...css.btn(),width:"100%",padding:14,fontSize:15,opacity:canNext()?1:.4}}>{L.cont} →</button>
              <Prog n={1}/>
            </>}

            {step===1&&<>
              <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
                {L.genders.map(g=><button key={g} onClick={()=>setForm(p=>({...p,gender:g}))} style={{...css.pill(form.gender===g,"#9333ea"),textTransform:"capitalize",padding:12,fontSize:16}}>{g}</button>)}
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>setStep(0)} style={{...css.btnBack,flex:1}}>← {L.back}</button>
                <button onClick={()=>setStep(2)} disabled={!canNext()} style={{...css.btn(),flex:2,opacity:canNext()?1:.4}}>{L.cont} →</button>
              </div>
              <Prog n={2}/>
            </>}

            {step===2&&<>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
                {L.interests.map(i=><button key={i} onClick={()=>toggleInterest(i)} style={{...css.pill(form.interests.includes(i),"#ec4899"),padding:"8px 12px",fontSize:13}}>{i}</button>)}
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>setStep(1)} style={{...css.btnBack,flex:1}}>← {L.back}</button>
                <button onClick={()=>setStep(3)} disabled={!canNext()} style={{...css.btn(),flex:2,opacity:canNext()?1:.4}}>{L.cont} →</button>
              </div>
              <Prog n={3}/>
            </>}

            {step===3&&<>
              <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
                {L.styles.map(st=><button key={st.v} onClick={()=>setForm(p=>({...p,style:st.v}))}
                  style={{...css.pill(form.style===st.v,"#f97316"),display:"flex",alignItems:"center",gap:12,padding:"10px 14px",textAlign:"left"}}>
                  <span style={{fontSize:22}}>{st.e}</span>
                  <div><div style={{fontWeight:700,fontSize:13}}>{st.l}</div><div style={{fontSize:11,opacity:.7}}>{st.d}</div></div>
                </button>)}
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>setStep(2)} style={{...css.btnBack,flex:1}}>← {L.back}</button>
                <button onClick={()=>setStep(4)} disabled={!canNext()} style={{...css.btn(),flex:2,opacity:canNext()?1:.4}}>{L.cont} →</button>
              </div>
              <Prog n={4}/>
            </>}

            {step===4&&<>
              <textarea ref={lessonRef} defaultValue={form.lesson} placeholder={L.lessonPH}
                style={{...css.inp,height:96,resize:"none",fontSize:14,marginBottom:16}}/>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>setStep(3)} style={{...css.btnBack,flex:1}}>← {L.back}</button>
                <button onClick={generate} style={{...css.btn(true),flex:2}}>{L.createBtn} ✨</button>
              </div>
              <Prog n={5}/>
            </>}
          </div>
        </div>
      </Page>
    );
  }

  // ── Story view ────────────────────────────────────────────────────────────
  if(view==="story"&&story)return(
    <Page>
      <div style={{background:"#fff",borderRadius:24,boxShadow:"0 10px 40px rgba(0,0,0,.1)",overflow:"hidden"}}>
        <div style={{background:GR,padding:20,textAlign:"center",color:"#fff"}}>
          <div style={{fontSize:28}}>📖</div>
          <h1 style={{margin:"4px 0 0",fontWeight:700,fontSize:18}}>{L.steps[6]}</h1>
          <p style={{margin:"2px 0 0",fontSize:12,opacity:.8}}>{APIS.find(a=>a.id===story.usedApi)?APIS.find(a=>a.id===story.usedApi).name:""}</p>
        </div>
        <div style={{padding:20}}>
          <StoryBox text={story.text} img={imgUrl}/>
          <ReadCtrl/>
          <AudioCtrl text={story.text}/>
          <div style={{textAlign:"center",color:"#818cf8",fontSize:13,marginBottom:16}}>⭐ {L.sweet} ⭐</div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={saveStory}
              style={{flex:1,padding:12,borderRadius:16,fontWeight:700,fontSize:14,cursor:"pointer",
                background:savedMsg?"#d1fae5":"#eef2ff",color:savedMsg?"#065f46":"#4338ca",border:"2px solid "+(savedMsg?"#6ee7b7":"#c7d2fe")}}>
              {savedMsg?L.saved:L.save}
            </button>
            <button onClick={resetCreate} style={{...css.btn(),flex:1,padding:12}}>{L.again}</button>
          </div>
        </div>
      </div>
    </Page>
  );

  return null;
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
