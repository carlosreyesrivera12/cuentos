function App(){
  const[user,setUser]=useState(null);
  const[authReady,setAuthReady]=useState(false);
  const[lang,setLang]=useState("es");
  const[view,setView]=useState("home");
  const[step,setStep]=useState(0);
  const[form,setForm]=useState({age:"",gender:"",interests:[],style:"",lesson:""});
  const[book,setBook]=useState(null); // {title, chapters:[{title,text,imagePrompt,imgUrl,imgLoaded}]}
  const[curChap,setCurChap]=useState(0);
  const[displayed,setDisplayed]=useState("");
  const[animating,setAnimating]=useState(false);
  const[busy,setBusy]=useState(false);
  const[busyMsg,setBusyMsg]=useState("");
  const[savedMsg,setSavedMsg]=useState(false);
  const[stories,setStories]=useState([]);
  const[selected,setSelected]=useState(null);
  const[selChap,setSelChap]=useState(0);
  const[proposal,setProposal]=useState("");
  const[voices,setVoices]=useState([]);
  const[selVoice,setSelVoice]=useState("");
  const[speaking,setSpeaking]=useState(false);
  const[preferredApi,setPreferredApi]=useState("groq");
  const[apiUsage,setApiUsage]=useState({});
  const[adminSaved,setAdminSaved]=useState(false);
  const[keysLoaded,setKeysLoaded]=useState(false);

  const animRef=useRef(null);
  const lessonRef=useRef(null);
  const thumbsRef=useRef(null);
  const L=LANGS[lang];
  const isAdmin=user&&user.uid===ADMIN_UID;

  useEffect(()=>firebase.auth().onAuthStateChanged(u=>{setUser(u);setAuthReady(true);}),[]);

  useEffect(()=>{
    const load=()=>{const v=window.speechSynthesis.getVoices();if(v.length)setVoices(v);};
    if("speechSynthesis" in window){load();window.speechSynthesis.onvoiceschanged=load;setTimeout(load,600);}
  },[]);

  useEffect(()=>{
    if(!user||!isAdmin||keysLoaded)return;
    db.doc("config/apikeys").get().then(snap=>{
      if(snap.exists){const d=snap.data();const u={};APIS.forEach(a=>{u[a.id]=d["usage_"+a.id]||0;});setApiUsage(u);if(d.preferred)setPreferredApi(d.preferred);}
      setKeysLoaded(true);
    });
  },[user,isAdmin,keysLoaded]);

  const signIn=()=>auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
  const signOutUser=()=>{auth.signOut();setUser(null);setView("home");};

  const bumpUsage=async(id)=>{
    setApiUsage(p=>({...p,[id]:(p[id]||0)+1}));
    try{const snap=await db.doc("config/apikeys").get();if(!snap.exists)return;const d=snap.data();db.doc("config/apikeys").set({...d,["usage_"+id]:(d["usage_"+id]||0)+1});}catch{}
  };

  const savePreferred=async(api)=>{
    setPreferredApi(api);
    try{const snap=await db.doc("config/apikeys").get();if(snap.exists)db.doc("config/apikeys").set({...snap.data(),preferred:api});}catch{}
    setAdminSaved(true);setTimeout(()=>setAdminSaved(false),1500);
  };

  // ── Generate story with 10 chapters ─────────────────────────────────────
  const generate=async()=>{
    setBusy(true);setBusyMsg(L.loading);
    const lesson=lessonRef.current?lessonRef.current.value:"";
    const f={...form,lesson};
    const prompt=buildPrompt(L,f);
    const order=[preferredApi,...APIS.map(a=>a.id).filter(id=>id!==preferredApi)];
    let raw="",usedApi="";

    for(const apiId of order){
      const api=APIS.find(a=>a.id===apiId);
      try{raw=await api.call(prompt);if(raw){usedApi=apiId;await bumpUsage(apiId);break;}}catch{continue;}
    }

    if(!raw){setBusy(false);alert("No se pudo generar. Verifica las API keys.");return;}

    // Parse JSON
    let parsed;
    try{
      const clean=raw.replace(/```json|```/g,"").trim();
      parsed=JSON.parse(clean);
    }catch{
      // Intento de recuperación si el JSON está mal
      try{
        const match=raw.match(/\{[\s\S]*\}/);
        if(match)parsed=JSON.parse(match[0]);
      }catch{}
    }

    if(!parsed||!parsed.chapters){setBusy(false);alert("Error al parsear el cuento. Intenta de nuevo.");return;}

    // Asegurar exactamente 10 capítulos
    while(parsed.chapters.length<10){
      parsed.chapters.push({title:"Fin",text:"Y colorín colorado, este cuento ha terminado. ¡Dulces sueños!",imagePrompt:"magical night sky with stars and moon, children book illustration, peaceful ending"});
    }
    parsed.chapters=parsed.chapters.slice(0,10);

    // Inicializar book con imágenes pendientes
    const chapters=parsed.chapters.map((ch,i)=>({...ch,imgUrl:null,imgLoaded:false,seed:Math.floor(Math.random()*99999)+i*1000}));
    const newBook={title:parsed.title,chapters,usedApi,authorUid:user?user.uid:null,authorName:user?user.displayName:"Anónimo",lang,style:f.style,rating:{avg:0,count:0,votes:{}},extraChapters:[],createdAt:new Date().toISOString()};
    setBook(newBook);
    setCurChap(0);
    setDisplayed("");
    setAnimating(false);
    setView("book");
    setBusyMsg(L.loadingImg);

    // Generar imágenes en paralelo
    const withImages={...newBook,chapters:[...chapters]};
    await Promise.all(chapters.map(async(ch,i)=>{
      try{
        const url=await genImage(ch.imagePrompt,ch.seed);
        withImages.chapters[i]={...withImages.chapters[i],imgUrl:url,imgLoaded:true};
        setBook(p=>p?{...p,chapters:p.chapters.map((c,j)=>j===i?{...c,imgUrl:url,imgLoaded:true}:c)}:p);
      }catch{}
    }));
    setBusy(false);
  };

  // ── Animation ─────────────────────────────────────────────────────────────
  const startAnim=useCallback((text,fromWord=0)=>{
    clearInterval(animRef.current);
    const words=(text||"").split(" ");
    let i=Math.max(0,fromWord);
    setDisplayed(words.slice(0,i).join(" "));
    setAnimating(true);
    animRef.current=setInterval(()=>{
      i++;setDisplayed(words.slice(0,i).join(" "));
      if(i>=words.length){clearInterval(animRef.current);setAnimating(false);}
    },110);
  },[]);

  const pauseAnim=()=>{clearInterval(animRef.current);setAnimating(false);};
  const rewindAnim=()=>{const text=book?book.chapters[curChap].text:"";startAnim(text,Math.max(0,displayed.split(" ").length-20));};
  useEffect(()=>()=>clearInterval(animRef.current),[]);

  // Reset animation when chapter changes
  useEffect(()=>{
    setDisplayed("");setAnimating(false);clearInterval(animRef.current);
    if(speaking){window.speechSynthesis.cancel();setSpeaking(false);}
  },[curChap]);

  // ── Audio ─────────────────────────────────────────────────────────────────
  const speak=(text)=>{
    if(!("speechSynthesis" in window))return;
    if(speaking){window.speechSynthesis.cancel();setSpeaking(false);return;}
    window.speechSynthesis.cancel();
    const utt=new SpeechSynthesisUtterance(text);
    utt.rate=0.85;utt.pitch=1.05;
    const lm={es:"es",ca:"ca",fr:"fr",en:"en",pt:"pt"};
    const chosen=voices.find(v=>v.voiceURI===selVoice)||voices.find(v=>v.lang.startsWith(lm[lang]))||voices[0];
    if(chosen)utt.voice=chosen;
    utt.onend=()=>setSpeaking(false);
    utt.onerror=()=>setSpeaking(false);
    window.speechSynthesis.speak(utt);
    setSpeaking(true);
  };
  const vfl=voices.filter(v=>v.lang.startsWith(lang==="ca"?"ca":lang==="es"?"es":lang==="fr"?"fr":lang==="pt"?"pt":"en"));

  // ── Firestore ─────────────────────────────────────────────────────────────
  const saveBook=async()=>{
    if(!user||!book)return;
    const toSave={...book,chapters:book.chapters.map(c=>({title:c.title,text:c.text,imagePrompt:c.imagePrompt,imgUrl:c.imgUrl||null}))};
    const ref=await db.collection("stories").add(toSave);
    setBook(p=>({...p,id:ref.id}));
    setSavedMsg(true);setTimeout(()=>setSavedMsg(false),2000);
  };

  const loadStories=async()=>{
    const snap=await db.collection("stories").orderBy("createdAt","desc").limit(30).get();
    setStories(snap.docs.map(d=>({id:d.id,...d.data()})));
  };
  useEffect(()=>{if(view==="community")loadStories();},[view]);

  const rateStory=async(s,stars)=>{
    if(!user||!s.id)return;
    const votes={...(s.rating?.votes||{}),[user.uid]:stars};
    const vals=Object.values(votes);
    const avg=vals.reduce((a,b)=>a+b,0)/vals.length;
    await db.doc("stories/"+s.id).update({"rating.votes":votes,"rating.avg":avg,"rating.count":vals.length});
    const upd={...s,rating:{votes,avg,count:vals.length}};
    setStories(p=>p.map(x=>x.id===s.id?upd:x));
    if(selected?.id===s.id)setSelected(upd);
  };

  const proposeChapter=async()=>{
    if(!user||!proposal.trim()||!selected?.id)return;
    const ch={text:proposal,proposedBy:user.displayName,proposedByUid:user.uid,status:"pending",createdAt:new Date().toISOString()};
    await db.doc("stories/"+selected.id).update({extraChapters:firebase.firestore.FieldValue.arrayUnion(ch)});
    setSelected(p=>({...p,extraChapters:[...(p.extraChapters||[]),ch]}));
    setProposal("");
  };

  const updateChapter=async(idx,status)=>{
    if(!selected?.id)return;
    const extraChapters=selected.extraChapters.map((c,i)=>i===idx?{...c,status}:c);
    await db.doc("stories/"+selected.id).update({extraChapters});
    setSelected(p=>({...p,extraChapters}));
  };

  // ── Helpers ───────────────────────────────────────────────────────────────
  const resetCreate=()=>{
    setStep(0);setBook(null);setCurChap(0);setDisplayed("");setAnimating(false);
    setForm({age:"",gender:"",interests:[],style:"",lesson:""});setView("create");
    if(speaking){window.speechSynthesis.cancel();setSpeaking(false);}
  };
  const toggleInterest=v=>setForm(p=>({...p,interests:p.interests.includes(v)?p.interests.filter(x=>x!==v):[...p.interests,v]}));
  const canNext=()=>{if(step===0)return form.age!=="";if(step===1)return form.gender!=="";if(step===2)return form.interests.length>0;if(step===3)return form.style!=="";return true;};

  const goChapter=(i)=>{
    if(!book||i<0||i>=book.chapters.length)return;
    setCurChap(i);
    // scroll thumbnail into view
    setTimeout(()=>{
      if(thumbsRef.current){
        const thumb=thumbsRef.current.children[i];
        if(thumb)thumb.scrollIntoView({behavior:"smooth",block:"nearest",inline:"center"});
      }
    },50);
  };

  // ── CSS ───────────────────────────────────────────────────────────────────
  const css={
    bg:{minHeight:"100vh",background:"linear-gradient(135deg,#e0e7ff,#f5f3ff,#fce7f3)"},
    card:{background:"#fff",borderRadius:24,boxShadow:"0 10px 40px rgba(0,0,0,.1)",padding:28,width:"100%",maxWidth:440,margin:"0 auto"},
    inp:{width:"100%",boxSizing:"border-box",padding:"12px 16px",border:"2px solid #e5e7eb",borderRadius:14,fontSize:15,outline:"none",fontFamily:"inherit"},
    pill:(on,c="#6366f1")=>({padding:"10px 16px",borderRadius:14,border:"2px solid "+(on?c:"#e5e7eb"),background:on?c+"18":"#fff",color:on?c:"#6b7280",fontWeight:700,cursor:"pointer",fontSize:14}),
    btn:(g)=>({padding:"12px 20px",borderRadius:16,border:"none",cursor:"pointer",fontWeight:700,fontSize:14,background:g?"linear-gradient(to right,#22c55e,#10b981)":GR,color:"#fff"}),
    btnBack:{padding:"12px 20px",borderRadius:16,border:"none",cursor:"pointer",fontWeight:600,fontSize:14,background:"#f3f4f6",color:"#374151"},
  };

  // ── Nav ───────────────────────────────────────────────────────────────────
  const Nav=()=>(
    <nav style={{background:"#fff",boxShadow:"0 1px 8px rgba(0,0,0,.08)",padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:10}}>
      <button onClick={()=>setView("home")} style={{background:"none",border:"none",cursor:"pointer",fontWeight:700,color:"#4f46e5",fontSize:15}}>🌙 Cuentos</button>
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        {user&&<>
          <button onClick={()=>setView("community")} style={{...css.pill(view==="community"),padding:"6px 12px",fontSize:12}}>{L.community}</button>
          <button onClick={resetCreate} style={{...css.pill(view==="create"||view==="book"),padding:"6px 12px",fontSize:12}}>{L.create}</button>
          {isAdmin&&<button onClick={()=>setView("admin")} style={{...css.pill(view==="admin","#f97316"),padding:"6px 12px",fontSize:12}}>🛡 Admin</button>}
          <button onClick={signOutUser} style={{background:"none",border:"none",cursor:"pointer",color:"#9ca3af",fontSize:18}}>⎋</button>
        </>}
        <select value={lang} onChange={e=>setLang(e.target.value)} style={{border:"1px solid #e5e7eb",borderRadius:8,padding:"4px 6px",fontSize:13,cursor:"pointer"}}>
          {Object.entries(LANGS).map(([k,v])=><option key={k} value={k}>{v.flag} {v.name}</option>)}
        </select>
      </div>
    </nav>
  );

  const Page=({children})=>(
    <div style={css.bg}><Nav/><div style={{padding:16,maxWidth:640,margin:"0 auto"}}>{children}</div></div>

  // ── Loading ───────────────────────────────────────────────────────────────
  if(!authReady)return(

      <div style={{width:36,height:36,border:"3px solid #6366f1",borderTopColor:"transparent",borderRadius:"50%"}} className="spin"/>

      <div style={{background:"#fff",borderRadius:24,boxShadow:"0 10px 40px rgba(0,0,0,.1)",padding:28}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
          <span style={{fontSize:24}}>🛡</span>
          <h2 style={{margin:0,fontSize:20,fontWeight:700}}>Panel Admin</h2>

        <p style={{fontSize:12,color:"#9ca3af",marginBottom:20}}>Keys protegidas en Cloudflare Worker. Solo tú ves este panel.</p>

        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:10,marginBottom:20}}>

              <div style={{fontSize:22,fontWeight:700,color:"#4f46e5"}}>{apiUsage[a.id]||0}</div>
              <div style={{fontSize:11,color:"#6b7280",marginTop:2}}>{a.name}</div>

            style={{width:"100%",padding:"10px",borderRadius:12,border:"2px solid #e5e7eb",fontSize:13}}>
            {APIS.map(a=><option key={a.id} value={a.id}>{a.name} — {a.free}</option>)}
          </select>

        </div>

        <div style={{padding:12,background:"#f0fdf4",borderRadius:12,border:"1px solid #6ee7b7",marginBottom:12}}>
          <p style={{margin:0,fontSize:12,color:"#065f46"}}>🔒 Las API keys viven en Cloudflare Worker como Secrets. Nunca se exponen al navegador.</p>

          <p style={{margin:0,fontSize:12,color:"#c2410c"}}>Para añadir o cambiar keys: Cloudflare Dashboard → Workers → cuentos-proxy → Settings → Variables and Secrets</p>
        </div>
      </div>
    </Page>
  );

  // ── Home ──────────────────────────────────────────────────────────────────
  if(view==="home")return(
    <Page>
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"72vh",textAlign:"center",gap:20}}>
        <div style={{fontSize:64}} className="pulse">🌙</div>
        <div>
          <h1 style={{margin:0,fontSize:28,fontWeight:700,color:"#1f2937"}}>Cuentos de Buenas Noches</h1>
          <p style={{color:"#6b7280",marginTop:8,fontSize:14,maxWidth:320,margin:"8px auto 0"}}>Crea cuentos ilustrados con 10 capítulos. Comparte, califica y colabora con tu comunidad.</p>
        </div>
        {!user
          ?<button onClick={signIn} style={{...css.btn(),padding:"14px 32px",fontSize:16,display:"flex",alignItems:"center",gap:10}}>👤 Entrar con Google</button>
          :<div style={{display:"flex",gap:12,flexWrap:"wrap",justifyContent:"center"}}>
              <button onClick={resetCreate} style={{...css.btn(),padding:"12px 24px",fontSize:15}}>✨ {L.create}</button>
              <button onClick={()=>setView("community")} style={{padding:"12px 24px",borderRadius:18,fontWeight:700,fontSize:15,background:"#fff",border:"2px solid #c7d2fe",color:"#4f46e5",cursor:"pointer"}}>🌍 {L.community}</button>
            </div>
        }
      </div>
    </Page>
  );

  // ── Create wizard ─────────────────────────────────────────────────────────
  const progress=((step+1)/5)*100;
  const Prog=({n})=>(
    <div style={{marginTop:20,textAlign:"center"}}>
      <div style={{fontSize:11,color:"#9ca3af",marginBottom:4}}>{L.step} {n} {L.of} 5</div>
      <div style={{height:6,background:"#f3f4f6",borderRadius:6}}><div style={{height:6,background:"#6366f1",borderRadius:6,width:progress+"%",transition:"width .3s"}}/></div>
    </div>
  );

  if(view==="create"){
    if(busy)return(
      <Page>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"60vh",textAlign:"center",gap:16}}>
          <div style={{fontSize:56}} className="pulse">🌙</div>
          <h2 style={{margin:0,fontSize:20,fontWeight:700,color:"#1f2937"}}>{busyMsg}</h2>
          <p style={{color:"#a78bfa",fontSize:13,margin:0}}>✨ Creando 10 capítulos con ilustraciones...</p>
          <div style={{width:32,height:32,border:"3px solid #6366f1",borderTopColor:"transparent",borderRadius:"50%"}} className="spin"/>
        </div>
      </Page>
    );

    const icons=["✨","💜","⭐","📖","💚"];
    return(
      <Page>
        <div style={{display:"flex",justifyContent:"center",paddingTop:8}}>
          <div style={{...css.card,maxWidth:step===2?520:440}}>
            <div style={{textAlign:"center",marginBottom:20}}>
              <div style={{fontSize:42}}>{icons[step]}</div>
              <h1 style={{margin:"8px 0 2px",fontSize:20,fontWeight:700,color:"#1f2937"}}>{L.steps[step]}</h1>
              <p style={{margin:0,color:"#9ca3af",fontSize:13}}>{L.subs[step]}</p>
            </div>

            {step===0&&<>
              <input type="number" min="2" max="12" placeholder={L.ageLabel} value={form.age}
                onChange={e=>setForm(p=>({...p,age:e.target.value}))}
                style={{...css.inp,fontSize:26,textAlign:"center",fontWeight:700,marginBottom:16}}/>
              <button onClick={()=>setStep(1)} disabled={!canNext()} style={{...css.btn(),width:"100%",padding:14,opacity:canNext()?1:.4}}>{L.cont} →</button>
              <Prog n={1}/>
            </>}

            {step===1&&<>
              <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
                {L.genders.map(g=><button key={g} onClick={()=>setForm(p=>({...p,gender:g}))} style={{...css.pill(form.gender===g,"#9333ea"),textTransform:"capitalize",padding:12,fontSize:16}}>{g}</button>)}
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>setStep(0)} style={{...css.btnBack,flex:1}}>← {L.back}</button>
                <button onClick={()=>setStep(2)} disabled={!canNext()} style={{...css.btn(),flex:2,opacity:canNext()?1:.4}}>{L.cont} →</button>
              </div>
              <Prog n={2}/>
            </>}

            {step===2&&<>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
                {L.interests.map(i=><button key={i} onClick={()=>toggleInterest(i)} style={{...css.pill(form.interests.includes(i),"#ec4899"),padding:"8px 12px",fontSize:13}}>{i}</button>)}
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>setStep(1)} style={{...css.btnBack,flex:1}}>← {L.back}</button>
                <button onClick={()=>setStep(3)} disabled={!canNext()} style={{...css.btn(),flex:2,opacity:canNext()?1:.4}}>{L.cont} →</button>
              </div>
              <Prog n={3}/>
            </>}

            {step===3&&<>
              <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
                {L.styles.map(st=><button key={st.v} onClick={()=>setForm(p=>({...p,style:st.v}))}
                  style={{...css.pill(form.style===st.v,"#f97316"),display:"flex",alignItems:"center",gap:12,padding:"10px 14px",textAlign:"left"}}>
                  <span style={{fontSize:22}}>{st.e}</span>
                  <div><div style={{fontWeight:700,fontSize:13}}>{st.l}</div><div style={{fontSize:11,opacity:.7}}>{st.d}</div></div>
                </button>)}
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>setStep(2)} style={{...css.btnBack,flex:1}}>← {L.back}</button>
                <button onClick={()=>setStep(4)} disabled={!canNext()} style={{...css.btn(),flex:2,opacity:canNext()?1:.4}}>{L.cont} →</button>
              </div>
              <Prog n={4}/>
            </>}

            {step===4&&<>
              <textarea ref={lessonRef} defaultValue={form.lesson} placeholder={L.lessonPH}
                style={{...css.inp,height:96,resize:"none",fontSize:14,marginBottom:16}}/>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>setStep(3)} style={{...css.btnBack,flex:1}}>← {L.back}</button>
                <button onClick={generate} style={{...css.btn(true),flex:2}}>{L.createBtn} ✨</button>
              </div>
              <Prog n={5}/>
            </>}
          </div>
        </div>
      </Page>
    );
  }

  // ── Book reader ───────────────────────────────────────────────────────────
  if((view==="book"&&book)||(view==="community"&&selected)){
    const isComm=view==="community"&&selected;
    const b=isComm?selected:book;
    const ci=isComm?selChap:curChap;
    const setCi=isComm?setSelChap:setCurChap;
    const ch=b&&b.chapters&&b.chapters[ci];
    if(!ch)return null;

    const isAuthor=b.authorUid===user?.uid;
    const myVote=b.rating?.votes?.[user?.uid]||0;
    const totalChaps=b.chapters.length;

    return(
      <Page>
        {isComm&&<button onClick={()=>{setSelected(null);if(speaking){window.speechSynthesis.cancel();setSpeaking(false);}}} style={{background:"none",border:"none",color:"#6366f1",cursor:"pointer",fontSize:13,marginBottom:12}}>← {L.back}</button>}

        <div style={{background:"#fff",borderRadius:24,boxShadow:"0 10px 40px rgba(0,0,0,.1)",overflow:"hidden"}}>

          {/* Header */}
          <div style={{background:GR,padding:"16px 20px",color:"#fff"}}>
            <div style={{fontSize:13,opacity:.8,marginBottom:2}}>{b.authorName} · {LANGS[b.lang]?.flag}</div>
            <h2 style={{margin:0,fontSize:17,fontWeight:700}}>{b.title}</h2>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:6}}>
              <span style={{fontSize:12,opacity:.8}}>{L.chapter} {ci+1} {L.of2} {totalChaps}: {ch.title}</span>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                {busy&&<div style={{width:14,height:14,border:"2px solid rgba(255,255,255,.5)",borderTopColor:"#fff",borderRadius:"50%"}} className="spin"/>}
                <span style={{fontSize:12,background:"rgba(255,255,255,.2)",padding:"2px 10px",borderRadius:20}}>★ {b.rating?.avg?.toFixed(1)||"—"}</span>
              </div>
            </div>
          </div>

          {/* Imagen del capítulo */}
          <div style={{position:"relative",height:260,background:"linear-gradient(135deg,#e0e7ff,#fce7f3)",overflow:"hidden"}}>
            {ch.imgUrl
              ?<img src={ch.imgUrl} alt={ch.title} style={{width:"100%",height:"100%",objectFit:"cover"}} onError={e=>e.target.style.display="none"}/>
              :<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",gap:10}}>
                  <div style={{width:32,height:32,border:"3px solid #6366f1",borderTopColor:"transparent",borderRadius:"50%"}} className="spin"/>
                  <div style={{fontSize:12,color:"#6b7280"}}>{L.loadingImg}</div>
                </div>
            }
            {/* Navegación sobre imagen */}
            <button onClick={()=>goChapter(ci-1)} disabled={ci===0}
              style={{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",width:36,height:36,borderRadius:"50%",background:"rgba(255,255,255,.85)",border:"none",cursor:ci===0?"not-allowed":"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",opacity:ci===0?.3:1}}>‹</button>
            <button onClick={()=>goChapter(ci+1)} disabled={ci===totalChaps-1}

            {/* Indicador capítulo */}
            <div style={{position:"absolute",bottom:8,left:"50%",transform:"translateX(-50%)",background:"rgba(0,0,0,.45)",color:"#fff",fontSize:11,padding:"3px 12px",borderRadius:20}}>
              {ci+1} / {totalChaps}

          {/* Texto animado */}
          <div style={{padding:"16px 20px",borderBottom:"1px solid #f3f4f6",minHeight:100,background:"#fffbeb"}}>

              {animating&&<span className="cursor"/>}
            </p>
          </div>

          {/* Controles lectura */}
          <div style={{padding:"12px 16px",display:"flex",gap:8,borderBottom:"1px solid #f3f4f6"}}>

            {animating
              ?<button onClick={pauseAnim} style={{flex:2,padding:"8px",borderRadius:12,background:"#fff7ed",border:"1px solid #fed7aa",color:"#c2410c",fontWeight:700,cursor:"pointer",fontSize:12}}>⏸ Pausar</button>
              :<button onClick={()=>startAnim(ch.text,displayed?displayed.split(" ").length:0)} style={{flex:2,padding:"8px",borderRadius:12,background:"#eef2ff",border:"1px solid #c7d2fe",color:"#4338ca",fontWeight:700,cursor:"pointer",fontSize:12}}>▶ Leer</button>
            }
            <button onClick={()=>{setDisplayed("");startAnim(ch.text,0);}} style={{flex:1,padding:"8px 4px",borderRadius:12,background:"#f9fafb",border:"1px solid #e5e7eb",cursor:"pointer",fontWeight:700,fontSize:12,color:"#374151"}}>🔁</button>
          </div>

          {/* Audio */}
          <div style={{padding:"10px 16px",borderBottom:"1px solid #f3f4f6",background:"#f5f3ff"}}>
            {vfl.length>0&&
              <select value={selVoice} onChange={e=>setSelVoice(e.target.value)}
                style={{width:"100%",padding:"7px 10px",borderRadius:10,border:"1px solid #c4b5fd",fontSize:13,color:"#4c1d95",background:"#fff",marginBottom:8}}>
                <option value="">🎙 Voz automática</option>
                {vfl.map(v=><option key={v.voiceURI} value={v.voiceURI}>{v.name}</option>)}
              </select>
            }
            <button onClick={()=>speak(ch.text)}
              style={{width:"100%",padding:9,borderRadius:12,fontWeight:700,fontSize:13,cursor:"pointer",border:"1px solid",
                background:speaking?"#fee2e2":"#ede9fe",color:speaking?"#991b1b":"#5b21b6",borderColor:speaking?"#fca5a5":"#c4b5fd"}}>
              {speaking?"⏹ Detener audio":"🔊 Escuchar capítulo"}
            </button>
          </div>

          {/* Miniaturas */}
          <div ref={thumbsRef} style={{display:"flex",gap:6,padding:"10px 16px",overflowX:"auto",borderBottom:"1px solid #f3f4f6"}}>
            {b.chapters.map((c,i)=>(
              <button key={i} onClick={()=>goChapter(i)}
                style={{flexShrink:0,width:56,height:56,borderRadius:10,overflow:"hidden",border:i===ci?"2px solid #6366f1":"1px solid #e5e7eb",cursor:"pointer",padding:0,position:"relative",background:"#f9fafb"}}>
                {c.imgUrl
                  ?<img src={c.imgUrl} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                  :<div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#9ca3af"}}>{i+1}</div>
                }
                <div style={{position:"absolute",bottom:0,left:0,right:0,background:"rgba(0,0,0,.45)",color:"#fff",fontSize:9,textAlign:"center",padding:"1px 0"}}>{i+1}</div>
              </button>
            ))}
          </div>

          {/* Rating + acciones */}
          <div style={{padding:"14px 20px"}}>
            {isComm&&!isAuthor&&user&&(
              <div style={{marginBottom:14}}>
                <p style={{fontSize:12,fontWeight:600,color:"#6b7280",margin:"0 0 6px"}}>{L.rate}</p>
                <Stars value={myVote} onChange={stars=>rateStory(b,stars)}/>
              </div>
            )}

            {/* Capítulos propuestos */}
            {isComm&&(
              <div style={{borderTop:"1px solid #f3f4f6",paddingTop:14,marginBottom:14}}>
                <h3 style={{margin:"0 0 10px",fontSize:13,fontWeight:700,color:"#374151"}}>{L.chapters}</h3>
                {(b.extraChapters||[]).map((ec,i)=>(
                  <div key={i} style={{borderRadius:12,padding:10,marginBottom:8,border:"1px solid "+(ec.status==="accepted"?"#6ee7b7":ec.status==="rejected"?"#fca5a5":"#e5e7eb"),background:ec.status==="accepted"?"#f0fdf4":ec.status==="rejected"?"#fef2f2":"#f9fafb"}}>
                    <p style={{margin:"0 0 4px",color:"#374151",fontSize:12}}>{ec.text}</p>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                      <span style={{fontSize:11,color:"#9ca3af"}}>{ec.proposedBy}</span>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <span style={{fontSize:11,fontWeight:600,color:ec.status==="accepted"?"#059669":ec.status==="rejected"?"#dc2626":"#d97706"}}>{L[ec.status]}</span>
                        {isAuthor&&ec.status==="pending"&&(
                          <div style={{display:"flex",gap:4}}>
                            <button onClick={()=>updateChapter(i,"accepted")} style={{padding:"2px 8px",borderRadius:8,background:"#d1fae5",border:"none",cursor:"pointer",color:"#065f46",fontSize:12}}>✓</button>
                            <button onClick={()=>updateChapter(i,"rejected")} style={{padding:"2px 8px",borderRadius:8,background:"#fee2e2",border:"none",cursor:"pointer",color:"#991b1b",fontSize:12}}>✗</button>
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                ))}
                {!isAuthor&&user&&(
                  <div>
                    <textarea value={proposal} onChange={e=>setProposal(e.target.value)} placeholder={L.proposePH}
                      style={{...css.inp,height:72,resize:"none",fontSize:13}}/>
                    <button onClick={proposeChapter} disabled={!proposal.trim()}
                      style={{width:"100%",marginTop:8,padding:10,borderRadius:14,fontWeight:700,fontSize:13,border:"none",
                        cursor:proposal.trim()?"pointer":"not-allowed",background:proposal.trim()?GR:"#f3f4f6",color:proposal.trim()?"#fff":"#9ca3af"}}>
                      {L.send}
                    </button>
                  </div>
                )}
              </div>
            )}

            <div style={{display:"flex",gap:8}}>
              {!isComm&&<button onClick={saveBook}
                style={{flex:1,padding:12,borderRadius:16,fontWeight:700,fontSize:14,cursor:"pointer",
                  background:savedMsg?"#d1fae5":"#eef2ff",color:savedMsg?"#065f46":"#4338ca",border:"1px solid "+(savedMsg?"#6ee7b7":"#c7d2fe")}}>
                {savedMsg?L.saved:L.save}
              </button>}
              <button onClick={resetCreate} style={{...css.btn(),flex:1,padding:12}}>{L.again}</button>
            </div>

            <div style={{textAlign:"center",color:"#818cf8",fontSize:13,marginTop:12}}>⭐ {L.sweet} ⭐</div>
          </div>
        </div>
      </Page>
    );
  }

  // ── Community ─────────────────────────────────────────────────────────────
  if(view==="community")return(
    <Page>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <h2 style={{margin:0,fontSize:18,fontWeight:700}}>{L.community}</h2>
        <button onClick={loadStories} style={{background:"none",border:"none",color:"#6366f1",cursor:"pointer",fontSize:13}}>↻</button>
      </div>
      {stories.length===0
        ?<p style={{textAlign:"center",color:"#9ca3af",marginTop:60}}>{L.noStories}</p>
        :<div style={{display:"flex",flexDirection:"column",gap:12}}>
            {stories.map(s=>{
              const cover=s.chapters&&s.chapters[0]?.imgUrl;
              return(
                <button key={s.id} onClick={()=>{setSelected(s);setSelChap(0);setDisplayed("");setAnimating(false);}}
                  style={{background:"#fff",borderRadius:18,boxShadow:"0 2px 12px rgba(0,0,0,.06)",padding:0,textAlign:"left",border:"none",cursor:"pointer",width:"100%",overflow:"hidden"}}>
                  {cover&&<img src={cover} alt="" style={{width:"100%",height:150,objectFit:"cover"}} onError={e=>e.target.style.display="none"}/>}
                  <div style={{padding:14}}>
                    <p style={{margin:0,fontWeight:700,fontSize:14,color:"#1f2937"}}>{s.title||"Cuento"}</p>
                    <p style={{margin:"4px 0 0",fontSize:12,color:"#6b7280"}}>{s.authorName} · {LANGS[s.lang]?.flag} · {s.chapters?.length||0} capítulos</p>
                    <div style={{display:"flex",justifyContent:"space-between",marginTop:6,alignItems:"center"}}>
                      <div style={{display:"flex",gap:4,overflow:"hidden"}}>
                        {(s.chapters||[]).slice(0,5).map((c,i)=>c.imgUrl&&(
                          <img key={i} src={c.imgUrl} alt="" style={{width:28,height:28,borderRadius:6,objectFit:"cover"}}/>
                        ))}
                      </div>
                      <span style={{fontSize:13,fontWeight:700,color:"#374151"}}>★ {s.rating?.avg?.toFixed(1)||"—"} <span style={{fontSize:11,color:"#9ca3af"}}>({s.rating?.count||0})</span></span>
                    </div>
                  </div>
                </button>
              );
            })}
          </div>
      }
    </Page>
  );

  return null;
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
