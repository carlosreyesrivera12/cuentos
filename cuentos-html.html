// ── APIs ──────────────────────────────────────────────────────────────────────
const APIS = [
  {
    id:"anthropic", name:"Claude Haiku",
    free:"$5 crédito (~500 cuentos)", docsUrl:"https://console.anthropic.com",
    call: async (prompt, key) => {
      const r = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":key,
          "anthropic-version":"2023-06-01",
          "anthropic-dangerous-direct-browser-ipc-access":"true"},
        body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:1000,
          messages:[{role:"user",content:prompt}]})
      });
      const d = await r.json();
      if(d.error) throw new Error(d.error.message);
      return d.content?.[0]?.text||"";
    }
  },
  {
    id:"gemini", name:"Gemini Flash",
    free:"15 req/min gratis", docsUrl:"https://aistudio.google.com",
    call: async (prompt, key) => {
      const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`,{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})
      });
      const d = await r.json();
      if(d.error) throw new Error(d.error.message);
      return d.candidates?.[0]?.content?.parts?.[0]?.text||"";
    }
  },
  {
    id:"groq", name:"Groq Llama 3.3",
    free:"14.400 req/día gratis", docsUrl:"https://console.groq.com",
    call: async (prompt, key) => {
      const r = await fetch("https://api.groq.com/openai/v1/chat/completions",{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":`Bearer ${key}`},
        body:JSON.stringify({model:"llama-3.3-70b-versatile",max_tokens:1000,
          messages:[{role:"user",content:prompt}]})
      });
      const d = await r.json();
      if(d.error) throw new Error(d.error.message);
      return d.choices?.[0]?.message?.content||"";
    }
  }
];

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [user,setUser]           = useState(null);
  const [authReady,setAuthReady] = useState(false);
  const [lang,setLang]           = useState("es");
  const [view,setView]           = useState("home");
  const [step,setStep]           = useState(0);
  const [form,setForm]           = useState({age:"",gender:"",interests:[],style:"",lesson:""});
  const [story,setStory]         = useState(null);
  const [busy,setBusy]           = useState(false);
  const [savedMsg,setSavedMsg]   = useState(false);
  const [stories,setStories]     = useState([]);
  const [selected,setSelected]   = useState(null);
  const [proposal,setProposal]   = useState("");
  const [displayed,setDisplayed] = useState("");
  const [animating,setAnimating] = useState(false);
  const [apiKeys,setApiKeys]     = useState({anthropic:"",gemini:"",groq:""});
  const [apiUsage,setApiUsage]   = useState({anthropic:0,gemini:0,groq:0});
  const [keysLoaded,setKeysLoaded]=useState(false);
  const [adminSaved,setAdminSaved]=useState(false);
  const [preferredApi,setPreferredApi]=useState("anthropic");

  const animRef  = useRef(null);
  const lessonRef = useRef(null);
  const L = LANGS[lang];
  const isAdmin = user?.uid===ADMIN_UID;

  useEffect(()=>firebase.auth().onAuthStateChanged(u=>{setUser(u);setAuthReady(true)}),[]);

  useEffect(()=>{
    if(!user||!isAdmin||keysLoaded) return;
    db.doc("config/apikeys").get().then(snap=>{
      if(snap.exists){
        const d=snap.data();
        setApiKeys({anthropic:d.anthropic||"",gemini:d.gemini||"",groq:d.groq||""});
        setApiUsage({anthropic:d.usage_anthropic||0,gemini:d.usage_gemini||0,groq:d.usage_groq||0});
        if(d.preferred) setPreferredApi(d.preferred);
      }
      setKeysLoaded(true);
    });
  },[user,isAdmin,keysLoaded]);

  const loadKeysForGen = ()=>db.doc("config/apikeys").get().then(s=>s.exists?s.data():{});

  const signIn = ()=>auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
  const signOutUser = ()=>{auth.signOut();setUser(null);setView("home");};

  const saveAdminKeys = async()=>{
    await db.doc("config/apikeys").set({
      anthropic:apiKeys.anthropic,gemini:apiKeys.gemini,groq:apiKeys.groq,
      preferred:preferredApi,
      usage_anthropic:apiUsage.anthropic,usage_gemini:apiUsage.gemini,usage_groq:apiUsage.groq
    });
    setAdminSaved(true);setTimeout(()=>setAdminSaved(false),2000);
  };

  const bumpUsage = async(apiId)=>{
    const snap=await db.doc("config/apikeys").get();
    if(!snap.exists) return;
    const d=snap.data(); const k=`usage_${apiId}`;
    await db.doc("config/apikeys").set({...d,[k]:(d[k]||0)+1});
    setApiUsage(p=>({...p,[apiId]:(p[apiId]||0)+1}));
  };

  const generate = async()=>{
    setBusy(true);
    const lesson=lessonRef.current?.value||"";
    const f={...form,lesson};
    const cfg=await loadKeysForGen();
    const prompt=L.prompt(f);
    const order=[preferredApi,...APIS.map(a=>a.id).filter(id=>id!==preferredApi)];
    let text="",usedApi="";
    for(const apiId of order){
      const api=APIS.find(a=>a.id===apiId);
      const key=cfg[apiId];
      if(!key) continue;
      try{ text=await api.call(prompt,key); if(text){usedApi=apiId;await bumpUsage(apiId);break;} }catch{continue;}
    }
    if(!text) text="No se pudo generar el cuento. Contacta al administrador.";
    setStory({text,lang,style:f.style,age:f.age,gender:f.gender,interests:f.interests,lesson:f.lesson,usedApi,
      authorUid:user?.uid,authorName:user?.displayName||"Anónimo",
      rating:{avg:0,count:0,votes:{}},chapters:[],createdAt:new Date().toISOString()});
    setDisplayed("");setAnimating(false);setBusy(false);setView("story");
  };

  const saveStory = async()=>{
    if(!user||!story) return;
    const ref=await db.collection("stories").add(story);
    setStory(p=>({...p,id:ref.id}));
    setSavedMsg(true);setTimeout(()=>setSavedMsg(false),2000);
  };

  const loadStories = async()=>{
    const snap=await db.collection("stories").orderBy("createdAt","desc").limit(30).get();
    setStories(snap.docs.map(d=>({id:d.id,...d.data()})));
  };

  useEffect(()=>{if(view==="community")loadStories();},[view]);

  const rateStory = async(s,stars)=>{
    if(!user||!s.id) return;
    const votes={...(s.rating?.votes||{}),[user.uid]:stars};
    const vals=Object.values(votes);
    const avg=vals.reduce((a,b)=>a+b,0)/vals.length;
    await db.doc(`stories/${s.id}`).update({"rating.votes":votes,"rating.avg":avg,"rating.count":vals.length});
    const updated={...s,rating:{votes,avg,count:vals.length}};
    setStories(p=>p.map(x=>x.id===s.id?updated:x));
    if(selected?.id===s.id) setSelected(updated);
  };

  const proposeChapter = async()=>{
    if(!user||!proposal.trim()||!selected?.id) return;
    const ch={text:proposal,proposedBy:user.displayName,proposedByUid:user.uid,
      status:"pending",createdAt:new Date().toISOString()};
    await db.doc(`stories/${selected.id}`).update({chapters:firebase.firestore.FieldValue.arrayUnion(ch)});
    setSelected(p=>({...p,chapters:[...(p.chapters||[]),ch]}));
    setProposal("");
  };

  const updateChapter = async(idx,status)=>{
    if(!selected?.id) return;
    const chapters=selected.chapters.map((c,i)=>i===idx?{...c,status}:c);
    await db.doc(`stories/${selected.id}`).update({chapters});
    setSelected(p=>({...p,chapters}));
  };

  const startAnim = (fromWord=0)=>{
    clearInterval(animRef.current);
    const words=(selected?.text||story?.text||"").split(" ");
    let i=Math.max(0,fromWord);
    setDisplayed(words.slice(0,i).join(" "));
    setAnimating(true);
    animRef.current=setInterval(()=>{
      i++;setDisplayed(words.slice(0,i).join(" "));
      if(i>=words.length){clearInterval(animRef.current);setAnimating(false);}
    },120);
  };
  const pauseAnim=()=>{clearInterval(animRef.current);setAnimating(false);};
  const rewindAnim=()=>startAnim(Math.max(0,displayed.split(" ").length-20));
  useEffect(()=>()=>clearInterval(animRef.current),[]);

  const resetCreate=()=>{
    setStep(0);setStory(null);setDisplayed("");setAnimating(false);
    setForm({age:"",gender:"",interests:[],style:"",lesson:""});
    setView("create");
  };
  const toggleInterest=v=>setForm(p=>({...p,interests:p.interests.includes(v)?p.interests.filter(x=>x!==v):[...p.interests,v]}));
  const canNext=()=>{
    if(step===0) return form.age!=="";
    if(step===1) return form.gender!=="";
    if(step===2) return form.interests.length>0;
    if(step===3) return form.style!=="";
    return true;
  };

  // ── Styles helpers ────────────────────────────────────────────────────────
  const card = {background:"#fff",borderRadius:24,boxShadow:"0 10px 40px rgba(0,0,0,.1)",padding:28,width:"100%",maxWidth:440,margin:"0 auto"};
  const wideCard = {...card,maxWidth:520};
  const bg = {minHeight:"100vh",background:"linear-gradient(135deg,#e0e7ff,#f5f3ff,#fce7f3)"};
  const inp = {width:"100%",boxSizing:"border-box",padding:"12px 20px",border:"2px solid #e5e7eb",borderRadius:16,fontSize:16,outline:"none",fontFamily:"inherit"};
  const pill = (active,color="#6366f1")=>({padding:"10px 16px",borderRadius:16,border:`2px solid ${active?color:"#e5e7eb"}`,
    background:active?`${color}15`:"#fff",color:active?color:"#6b7280",fontWeight:700,cursor:"pointer",transition:"all .15s",fontSize:14});

  if(!authReady) return <div style={{...bg,display:"flex",alignItems:"center",justifyContent:"center"}}>
    <div style={{width:32,height:32,border:"3px solid #6366f1",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
  </div>;

  // ── Nav ───────────────────────────────────────────────────────────────────
  const Nav = ()=>(
    <nav style={{background:"#fff",boxShadow:"0 1px 8px rgba(0,0,0,.08)",padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:10}}>
      <button onClick={()=>setView("home")} style={{background:"none",border:"none",cursor:"pointer",fontWeight:700,color:"#4f46e5",fontSize:15,display:"flex",alignItems:"center",gap:6}}>
        🌙 Cuentos
      </button>
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        {user&&<>
          <button onClick={()=>setView("community")} style={{...pill(view==="community"),padding:"6px 12px"}}>
            {L.community}
          </button>
          <button onClick={resetCreate} style={{...pill(view==="create"||view==="story"),padding:"6px 12px"}}>
            {L.create}
          </button>
          {isAdmin&&<button onClick={()=>setView("admin")}
            style={{...pill(view==="admin","#f97316"),padding:"6px 12px"}}>
            🛡 Admin
          </button>}
          <button onClick={signOutUser} style={{background:"none",border:"none",cursor:"pointer",color:"#9ca3af",fontSize:13}}>
            ⎋
          </button>
        </>}
        <select value={lang} onChange={e=>setLang(e.target.value)}
          style={{border:"1px solid #e5e7eb",borderRadius:8,padding:"4px 6px",fontSize:13,color:"#374151",cursor:"pointer"}}>
          {Object.entries(LANGS).map(([k,v])=><option key={k} value={k}>{v.flag} {v.name}</option>)}
        </select>
      </div>
    </nav>
  );

  const Page = ({children})=>(
    <div style={bg}>
      <Nav/>
      <div style={{padding:16,maxWidth:600,margin:"0 auto"}}>{children}</div>
    </div>
  );

  // ── Admin ─────────────────────────────────────────────────────────────────
  if(view==="admin"&&isAdmin) return <Page>
    <div style={{background:"#fff",borderRadius:24,boxShadow:"0 10px 40px rgba(0,0,0,.1)",padding:28}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
        <span style={{fontSize:24}}>🛡</span>
        <h2 style={{margin:0,fontSize:20,fontWeight:700}}>Panel Admin</h2>
      </div>
      <p style={{fontSize:12,color:"#9ca3af",marginBottom:24}}>Solo visible para ti. Las keys nunca se exponen a otros usuarios.</p>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:24}}>
        {APIS.map(api=>(
          <div key={api.id} style={{background:"#f9fafb",borderRadius:16,padding:16,textAlign:"center",border:"1px solid #f3f4f6"}}>
            <div style={{fontSize:28,fontWeight:700,color:"#4f46e5"}}>{apiUsage[api.id]||0}</div>
            <div style={{fontSize:12,color:"#6b7280",marginTop:2}}>{api.name}</div>
            <div style={{fontSize:11,color:"#9ca3af"}}>{api.free}</div>
          </div>
        ))}
      </div>

      <div style={{marginBottom:16}}>
        <label style={{fontSize:12,fontWeight:600,color:"#6b7280",display:"block",marginBottom:8}}>API preferida (fallback automático)</label>
        <div style={{display:"flex",gap:8}}>
          {APIS.map(api=>(
            <button key={api.id} onClick={()=>setPreferredApi(api.id)}
              style={{...pill(preferredApi===api.id),flex:1,textAlign:"center"}}>
              {api.name}
            </button>
          ))}
        </div>
      </div>

      {APIS.map(api=>(
        <div key={api.id} style={{marginBottom:16}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
            <label style={{fontSize:12,fontWeight:600,color:"#374151"}}>{api.name}</label>
            <a href={api.docsUrl} target="_blank" rel="noreferrer" style={{fontSize:12,color:"#6366f1",textDecoration:"none"}}>Obtener key →</a>
          </div>
          <input type="password" placeholder={`Key de ${api.name}`}
            value={apiKeys[api.id]}
            onChange={e=>setApiKeys(p=>({...p,[api.id]:e.target.value}))}
            style={{...inp,fontFamily:"monospace",fontSize:13}}/>
          <p style={{fontSize:11,color:"#9ca3af",marginTop:2}}>{api.free}</p>
        </div>
      ))}

      <button onClick={saveAdminKeys}
        style={{width:"100%",padding:"14px",borderRadius:18,fontWeight:700,fontSize:14,marginTop:8,
          ...(adminSaved?{background:"#d1fae5",color:"#065f46",border:"2px solid #6ee7b7"}:{...grBtn,border:"none"})}}>
        {adminSaved?"✓ Guardado en Firestore":"Guardar keys de forma segura"}
      </button>

      <div style={{marginTop:16,padding:12,background:"#fff7ed",borderRadius:12,border:"1px solid #fed7aa"}}>
        <p style={{fontSize:12,color:"#c2410c",margin:0}}>🔒 Las keys se guardan en Firestore protegidas por Security Rules. Solo tu UID puede leerlas o modificarlas.</p>
      </div>
    </div>
  </Page>;

  // ── Home ──────────────────────────────────────────────────────────────────
  if(view==="home") return <Page>
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"70vh",textAlign:"center",gap:20}}>
      <div style={{fontSize:64,animation:"pulse 2s infinite"}}>🌙</div>
      <div>
        <h1 style={{margin:0,fontSize:28,fontWeight:700,color:"#1f2937"}}>Cuentos de Buenas Noches</h1>
        <p style={{color:"#6b7280",marginTop:8,fontSize:14,maxWidth:320}}>Crea, comparte y califica cuentos. Colabora en nuevos capítulos con tu comunidad.</p>
      </div>
      {!user
        ?<button onClick={signIn} style={{...grBtn,padding:"14px 32px",borderRadius:20,fontWeight:700,fontSize:16,display:"flex",alignItems:"center",gap:10}}>
            👤 Entrar con Google
          </button>
        :<div style={{display:"flex",gap:12,flexWrap:"wrap",justifyContent:"center"}}>
            <button onClick={resetCreate} style={{...grBtn,padding:"12px 24px",borderRadius:18,fontWeight:700,fontSize:15,display:"flex",alignItems:"center",gap:8}}>
              ✨ {L.create}
            </button>
            <button onClick={()=>setView("community")}
              style={{padding:"12px 24px",borderRadius:18,fontWeight:700,fontSize:15,background:"#fff",border:"2px solid #c7d2fe",color:"#4f46e5",cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>
              🌍 {L.community}
            </button>
          </div>
      }
    </div>
  </Page>;

  // ── Community list ────────────────────────────────────────────────────────
  if(view==="community"&&!selected) return <Page>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
      <h2 style={{margin:0,fontSize:18,fontWeight:700}}>{L.community}</h2>
      <button onClick={loadStories} style={{background:"none",border:"none",color:"#6366f1",cursor:"pointer",fontSize:13}}>↻ Actualizar</button>
    </div>
    {stories.length===0
      ?<p style={{textAlign:"center",color:"#9ca3af",marginTop:60}}>{L.noStories}</p>
      :<div style={{display:"flex",flexDirection:"column",gap:12}}>
          {stories.map(s=>(
            <button key={s.id} onClick={()=>{setSelected(s);setDisplayed("");setAnimating(false);}}
              style={{background:"#fff",borderRadius:18,boxShadow:"0 2px 12px rgba(0,0,0,.06)",padding:16,textAlign:"left",border:"none",cursor:"pointer",width:"100%"}}>
              <div style={{display:"flex",justifyContent:"space-between",gap:12,alignItems:"flex-start"}}>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{margin:0,fontSize:13,color:"#374151",overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{s.text?.slice(0,100)}...</p>
                  <p style={{margin:"6px 0 0",fontSize:11,color:"#9ca3af"}}>{s.authorName} · {LANGS[s.lang]?.flag} · {s.style}</p>
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontSize:13,fontWeight:700,color:"#374151"}}>★ {s.rating?.avg?.toFixed(1)||"—"}</div>
                  <div style={{fontSize:11,color:"#9ca3af"}}>{s.rating?.count||0} votos</div>
                </div>
              </div>
            </button>
          ))}
        </div>
    }
  </Page>;

  // ── Story detail ──────────────────────────────────────────────────────────
  if(view==="community"&&selected){
    const myVote=selected.rating?.votes?.[user?.uid]||0;
    const isAuthor=selected.authorUid===user?.uid;
    const StoryBox=()=>(
      <div style={{background:"#fffbeb",borderRadius:18,padding:20,borderLeft:"4px solid #fb923c",marginBottom:12,minHeight:80}}>
        {displayed===""&&!animating
          ?<p style={{color:"#9ca3af",fontSize:13,margin:0,fontStyle:"italic"}}>Pulsa {L.read} para leer</p>
          :<p style={{margin:0,color:"#1f2937",lineHeight:1.7,whiteSpace:"pre-wrap",fontSize:14,fontFamily:"Georgia,serif"}}>
              {displayed}{animating&&<span style={{display:"inline-block",width:8,height:16,background:"#fb923c",marginLeft:4,borderRadius:3,verticalAlign:"middle",animation:"pulse 1s infinite"}}/>}
            </p>
        }
      </div>
    );
    return <Page>
      <button onClick={()=>{setSelected(null);pauseAnim();}}
        style={{background:"none",border:"none",color:"#6366f1",cursor:"pointer",fontSize:13,marginBottom:12,display:"flex",alignItems:"center",gap:4}}>
        ← {L.back}
      </button>
      <div style={{background:"#fff",borderRadius:24,boxShadow:"0 10px 40px rgba(0,0,0,.1)",overflow:"hidden"}}>
        <div style={{background:GR,padding:20,color:"#fff"}}>
          <p style={{margin:0,fontSize:12,opacity:.8}}>{selected.authorName} · {LANGS[selected.lang]?.flag} · {selected.style}</p>
          <p style={{margin:"4px 0 0",fontWeight:700}}>★ {selected.rating?.avg?.toFixed(1)||"—"} <span style={{fontSize:12,opacity:.7}}>({selected.rating?.count||0} votos)</span></p>
        </div>
        <div style={{padding:20}}>
          <StoryBox/>
          <div style={{display:"flex",gap:8,marginBottom:16}}>
            <button onClick={rewindAnim} style={{...pill(false),flex:1,textAlign:"center",padding:"8px 4px",fontSize:12}}>{L.rewind}</button>
            {animating
              ?<button onClick={pauseAnim} style={{flex:2,padding:"8px 12px",borderRadius:14,background:"#fff7ed",border:"2px solid #fed7aa",color:"#c2410c",fontWeight:700,cursor:"pointer",fontSize:12}}>{L.pause}</button>
              :<button onClick={()=>startAnim(displayed?displayed.split(" ").length:0)}
                  style={{flex:2,padding:"8px 12px",borderRadius:14,background:"#eef2ff",border:"2px solid #c7d2fe",color:"#4338ca",fontWeight:700,cursor:"pointer",fontSize:12}}>{L.read}</button>
            }
            <button onClick={()=>{setDisplayed("");startAnim(0);}} style={{...pill(false),flex:1,textAlign:"center",padding:"8px 4px",fontSize:12}}>{L.restart}</button>
          </div>

          {!isAuthor&&user&&<div style={{marginBottom:16}}>
            <p style={{fontSize:12,fontWeight:600,color:"#6b7280",marginBottom:4}}>{L.rate}</p>
            <Stars value={myVote} onChange={s=>rateStory(selected,s)}/>
          </div>}

          <div style={{borderTop:"1px solid #f3f4f6",paddingTop:16}}>
            <h3 style={{margin:"0 0 12px",fontSize:14,fontWeight:700,color:"#374151"}}>{L.chapters}</h3>
            {(selected.chapters||[]).map((ch,i)=>(
              <div key={i} style={{borderRadius:12,padding:12,marginBottom:8,fontSize:13,
                border:`2px solid ${ch.status==="accepted"?"#6ee7b7":ch.status==="rejected"?"#fca5a5":"#e5e7eb"}`,
                background:ch.status==="accepted"?"#f0fdf4":ch.status==="rejected"?"#fef2f2":"#f9fafb"}}>
                <p style={{margin:"0 0 6px",color:"#374151",fontSize:12}}>{ch.text}</p>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <span style={{fontSize:11,color:"#9ca3af"}}>{ch.proposedBy}</span>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:11,fontWeight:600,color:ch.status==="accepted"?"#059669":ch.status==="rejected"?"#dc2626":"#d97706"}}>{L[ch.status]}</span>
                    {isAuthor&&ch.status==="pending"&&<div style={{display:"flex",gap:4}}>
                      <button onClick={()=>updateChapter(i,"accepted")} style={{padding:"3px 8px",borderRadius:8,background:"#d1fae5",border:"none",cursor:"pointer",color:"#065f46",fontSize:12}}>✓</button>
                      <button onClick={()=>updateChapter(i,"rejected")} style={{padding:"3px 8px",borderRadius:8,background:"#fee2e2",border:"none",cursor:"pointer",color:"#991b1b",fontSize:12}}>✗</button>
                    </div>}
                  </div>
                </div>
              </div>
            ))}
            {!isAuthor&&user&&<div style={{marginTop:12}}>
              <textarea value={proposal} onChange={e=>setProposal(e.target.value)}
                placeholder={L.proposePH}
                style={{...inp,height:80,resize:"none",fontSize:13}}/>
              <button onClick={proposeChapter} disabled={!proposal.trim()}
                style={{width:"100%",marginTop:8,padding:"10px",borderRadius:14,fontWeight:700,fontSize:13,
                  ...(proposal.trim()?{...grBtn,border:"none"}:{background:"#f3f4f6",color:"#9ca3af",border:"none",cursor:"not-allowed"})}}>
                {L.send}
              </button>
            </div>}
          </div>
        </div>
      </div>
    </Page>;
  }

  // ── Create steps ──────────────────────────────────────────────────────────
  const progress=((step+1)/5)*100;
  const Prog=({n})=>(
    <div style={{marginTop:20,textAlign:"center"}}>
      <div style={{fontSize:11,color:"#9ca3af",marginBottom:4}}>{L.step} {n} {L.of} 5</div>
      <div style={{height:6,background:"#f3f4f6",borderRadius:6}}>
        <div style={{height:6,background:"#6366f1",borderRadius:6,width:`${progress}%`,transition:"width .3s"}}/>
      </div>
    </div>
  );

  if(view==="create"){
    if(busy) return <Page>
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"60vh",textAlign:"center",gap:16}}>
        <div style={{fontSize:56,animation:"pulse 2s infinite"}}>🌙</div>
        <h2 style={{margin:0,fontSize:20,fontWeight:700,color:"#1f2937"}}>{L.steps[5]}</h2>
        <p style={{color:"#9ca3af",fontSize:14}}>{L.subs[5]}</p>
        <div style={{width:32,height:32,border:"3px solid #6366f1",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
      </div>
    </Page>;

    const StepIcon=[<span style={{fontSize:40}}>✨</span>,<span style={{fontSize:40}}>💜</span>,<span style={{fontSize:40}}>⭐</span>,<span style={{fontSize:40}}>📖</span>,<span style={{fontSize:40}}>💚</span>];

    return <Page>
      <div style={{display:"flex",justifyContent:"center",paddingTop:8}}>
        <div style={step===2?wideCard:card}>
          <div style={{textAlign:"center",marginBottom:20}}>
            {StepIcon[step]}
            <h1 style={{margin:"8px 0 2px",fontSize:20,fontWeight:700,color:"#1f2937"}}>{L.steps[step]}</h1>
            <p style={{margin:0,color:"#9ca3af",fontSize:13}}>{L.subs[step]}</p>
          </div>

          {step===0&&<>
            <input type="number" min="2" max="12" placeholder={L.ageLabel} value={form.age}
              onChange={e=>setForm(p=>({...p,age:e.target.value}))}
              style={{...inp,fontSize:26,textAlign:"center",fontWeight:700,marginBottom:16}}/>
            <button onClick={()=>setStep(1)} disabled={!canNext()}
              style={{width:"100%",padding:14,borderRadius:18,fontWeight:700,fontSize:15,
                ...(canNext()?{...grBtn,border:"none"}:{background:"#f3f4f6",color:"#9ca3af",border:"none",cursor:"not-allowed"})}}>
              {L.cont} →
            </button>
            <Prog n={1}/>
          </>}

          {step===1&&<>
            <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
              {L.genders.map(g=>(
                <button key={g} onClick={()=>setForm(p=>({...p,gender:g}))}
                  style={{...pill(form.gender===g,"#9333ea"),textTransform:"capitalize",padding:12,fontSize:16}}>
                  {g}
                </button>
              ))}
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setStep(0)} style={{flex:1,padding:12,borderRadius:16,background:"#f3f4f6",border:"none",cursor:"pointer",fontWeight:600,fontSize:14}}>← {L.back}</button>
              <button onClick={()=>setStep(2)} disabled={!canNext()}
                style={{flex:2,padding:12,borderRadius:16,fontWeight:700,fontSize:14,
                  ...(canNext()?{...grBtn,border:"none"}:{background:"#f3f4f6",color:"#9ca3af",border:"none",cursor:"not-allowed"})}}>
                {L.cont} →
              </button>
            </div>
            <Prog n={2}/>
          </>}

          {step===2&&<>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
              {L.interests.map(i=>(
                <button key={i} onClick={()=>toggleInterest(i)}
                  style={{...pill(form.interests.includes(i),"#ec4899"),padding:"8px 12px",fontSize:13}}>
                  {i}
                </button>
              ))}
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setStep(1)} style={{flex:1,padding:12,borderRadius:16,background:"#f3f4f6",border:"none",cursor:"pointer",fontWeight:600,fontSize:14}}>← {L.back}</button>
              <button onClick={()=>setStep(3)} disabled={!canNext()}
                style={{flex:2,padding:12,borderRadius:16,fontWeight:700,fontSize:14,
                  ...(canNext()?{...grBtn,border:"none"}:{background:"#f3f4f6",color:"#9ca3af",border:"none",cursor:"not-allowed"})}}>
                {L.cont} →
              </button>
            </div>
            <Prog n={3}/>
          </>}

          {step===3&&<>
            <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
              {L.styles.map(s=>(
                <button key={s.value} onClick={()=>setForm(p=>({...p,style:s.value}))}
                  style={{...pill(form.style===s.value,"#f97316"),display:"flex",alignItems:"center",gap:12,padding:"10px 14px",textAlign:"left"}}>
                  <span style={{fontSize:22}}>{s.emoji}</span>
                  <div><div style={{fontWeight:700,fontSize:13}}>{s.label}</div><div style={{fontSize:11,opacity:.7}}>{s.desc}</div></div>
                </button>
              ))}
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setStep(2)} style={{flex:1,padding:12,borderRadius:16,background:"#f3f4f6",border:"none",cursor:"pointer",fontWeight:600,fontSize:14}}>← {L.back}</button>
              <button onClick={()=>setStep(4)} disabled={!canNext()}
                style={{flex:2,padding:12,borderRadius:16,fontWeight:700,fontSize:14,
                  ...(canNext()?{...grBtn,border:"none"}:{background:"#f3f4f6",color:"#9ca3af",border:"none",cursor:"not-allowed"})}}>
                {L.cont} →
              </button>
            </div>
            <Prog n={4}/>
          </>}

          {step===4&&<>
            <textarea ref={lessonRef} defaultValue={form.lesson} placeholder={L.lessonPH}
              style={{...inp,height:96,resize:"none",fontSize:14,marginBottom:16}}/>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setStep(3)} style={{flex:1,padding:12,borderRadius:16,background:"#f3f4f6",border:"none",cursor:"pointer",fontWeight:600,fontSize:14}}>← {L.back}</button>
              <button onClick={generate}
                style={{flex:2,padding:12,borderRadius:16,fontWeight:700,fontSize:14,background:"linear-gradient(to right,#22c55e,#10b981)",color:"#fff",border:"none",cursor:"pointer"}}>
                {L.createBtn} ✨
              </button>
            </div>
            <Prog n={5}/>
          </>}
        </div>
      </div>
    </Page>;
  }

  // ── Story view ────────────────────────────────────────────────────────────
  if(view==="story"&&story) return <Page>
    <div style={{background:"#fff",borderRadius:24,boxShadow:"0 10px 40px rgba(0,0,0,.1)",overflow:"hidden"}}>
      <div style={{background:GR,padding:20,textAlign:"center",color:"#fff"}}>
        <div style={{fontSize:28}}>📖</div>
        <h1 style={{margin:"4px 0 0",fontWeight:700,fontSize:18}}>{L.steps[6]}</h1>
        <p style={{margin:"2px 0 0",fontSize:12,opacity:.8}}>{L.subs[6]} · {APIS.find(a=>a.id===story.usedApi)?.name||""}</p>
      </div>
      <div style={{padding:20}}>
        <div style={{background:"#fffbeb",borderRadius:18,padding:20,borderLeft:"4px solid #fb923c",marginBottom:12,minHeight:80}}>
          {displayed===""&&!animating
            ?<p style={{color:"#9ca3af",fontSize:13,margin:0,fontStyle:"italic"}}>Pulsa {L.read} para leer</p>
            :<p style={{margin:0,color:"#1f2937",lineHeight:1.8,whiteSpace:"pre-wrap",fontSize:14,fontFamily:"Georgia,serif"}}>
                {displayed}{animating&&<span style={{display:"inline-block",width:8,height:16,background:"#fb923c",marginLeft:4,borderRadius:3,verticalAlign:"middle",animation:"pulse 1s infinite"}}/>}
              </p>
          }
        </div>
        <div style={{display:"flex",gap:8,marginBottom:16}}>
          <button onClick={rewindAnim} style={{flex:1,padding:"8px 4px",borderRadius:14,background:"#f9fafb",border:"2px solid #e5e7eb",cursor:"pointer",fontWeight:700,fontSize:12,color:"#374151"}}>{L.rewind}</button>
          {animating
            ?<button onClick={pauseAnim} style={{flex:2,padding:"8px 12px",borderRadius:14,background:"#fff7ed",border:"2px solid #fed7aa",color:"#c2410c",fontWeight:700,cursor:"pointer",fontSize:12}}>{L.pause}</button>
            :<button onClick={()=>startAnim(displayed?displayed.split(" ").length:0)}
                style={{flex:2,padding:"8px 12px",borderRadius:14,background:"#eef2ff",border:"2px solid #c7d2fe",color:"#4338ca",fontWeight:700,cursor:"pointer",fontSize:12}}>{L.read}</button>
          }
          <button onClick={()=>{setDisplayed("");startAnim(0);}} style={{flex:1,padding:"8px 4px",borderRadius:14,background:"#f9fafb",border:"2px solid #e5e7eb",cursor:"pointer",fontWeight:700,fontSize:12,color:"#374151"}}>{L.restart}</button>
        </div>
        <div style={{textAlign:"center",color:"#818cf8",fontSize:13,marginBottom:16}}>⭐ {L.sweet} ⭐</div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={saveStory}
            style={{flex:1,padding:12,borderRadius:16,fontWeight:700,fontSize:14,cursor:"pointer",
              ...(savedMsg?{background:"#d1fae5",color:"#065f46",border:"2px solid #6ee7b7"}:{background:"#eef2ff",color:"#4338ca",border:"2px solid #c7d2fe"})}}>
            {savedMsg?L.saved:L.save}
          </button>
          <button onClick={resetCreate}
            style={{flex:1,padding:12,borderRadius:16,fontWeight:700,fontSize:14,border:"none",cursor:"pointer",...grBtn}}>
            {L.again}
          </button>
        </div>
      </div>
    </div>
  </Page>;

  return null;
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
